<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body { height: 100%; overflow: hidden; }
body {
  background: #0a0a0a;
  display: flex; align-items: center; justify-content: center;
  min-height: 100vh;
  font-family: 'DM Sans', sans-serif;
}
body::before {
  content: '';
  position: fixed; inset: 0;
  background: radial-gradient(ellipse 80% 60% at 50% -10%, oklch(72% 0.13 82 / 0.08) 0%, transparent 70%);
  pointer-events: none;
}
#root { display: flex; align-items: center; justify-content: center; width: 100%; height: 100%; }

/* Tweaks panel */
#tweaks-panel {
  display: none; position: fixed; bottom: 2rem; right: 2rem; z-index: 1000;
  background: #111; border: 1px solid oklch(72% 0.13 82 / 0.3);
  padding: 1.5rem; width: 240px;
  font-family: 'DM Sans', sans-serif;
  box-shadow: 0 20px 60px #000a;
}
#tweaks-panel.show { display: block; }
.tweaks-title { font-family: 'Cormorant Garamond', serif; font-size: 1.1rem; margin-bottom: 1.2rem; color: oklch(72% 0.13 82); border-bottom: 1px solid #222; padding-bottom: 0.8rem; }
.tweak-row { margin-bottom: 1rem; }
.tweak-label { font-size: 0.65rem; letter-spacing: 0.15em; text-transform: uppercase; color: #666; margin-bottom: 0.4rem; display: block; }
.tweak-opts { display: flex; flex-direction: column; gap: 0.3rem; }
.tweak-btn { background: transparent; border: 1px solid #222; color: #ccc; padding: 0.4rem 0.7rem; font-size: 0.72rem; cursor: pointer; text-align: left; font-family: 'DM Sans', sans-serif; transition: all 0.2s; }
.tweak-btn.active { border-color: oklch(72% 0.13 82 / 0.6); color: oklch(72% 0.13 82); background: oklch(72% 0.13 82 / 0.08); }
</style>
</head>
<body>
<div id="root"></div>
<div id="tweaks-panel">
  <div class="tweaks-title">Tweaks</div>
  <div class="tweak-row">
    <span class="tweak-label">Theme</span>
    <div class="tweak-opts">
      <button class="tweak-btn active" onclick="setTheme('dark',this)">◆ Black & Gold</button>
      <button class="tweak-btn" onclick="setTheme('light',this)">◆ Cream & Black</button>
      <button class="tweak-btn" onclick="setTheme('violet',this)">◆ Dark Violet</button>

  </div>
  <div class="tweak-row">
    <span class="tweak-label">Language</span>

      <button class="tweak-btn active" onclick="setLang('en',this)">English</button>
      <button class="tweak-btn" onclick="setLang('he',this)">עברית</button>

// Global state for tweaks
window.__onyxTheme = 'dark';
window.__onyxLang = 'en';
window.__onyxSetTheme = null;
window.__onyxSetLang = null;

window.setTheme = (name, btn) => {
  window.__onyxTheme = name;
  btn.closest('.tweak-opts').querySelectorAll('.tweak-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  if (window.__onyxSetTheme) window.__onyxSetTheme(name);
};

window.setLang = (lang, btn) => {
  window.__onyxLang = lang;
  btn.closest('.tweak-opts').querySelectorAll('.tweak-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  if (window.__onyxSetLang) window.__onyxSetLang(lang);
};

// ── MAIN APP ──
const App = () => {
  const [tab, setTab] = useState('home');
  const [themeName, setThemeName] = useState(window.__onyxTheme || 'dark');
  const [lang, setLang] = useState(window.__onyxLang || 'en');

  window.__onyxSetTheme = setThemeName;
  window.__onyxSetLang = setLang;

  // Persist tab
  useEffect(() => {
    const saved = localStorage.getItem('onyx-tab');
    if (saved) setTab(saved);
  }, []);
  const goTab = (t) => { setTab(t); localStorage.setItem('onyx-tab', t); };

  const th = THEMES[themeName];
  const t = TEXT[lang];

  const screens = { home: HomeScreen, services: ServicesScreen, pricing: PricingScreen, contact: ContactScreen };
  const ActiveScreen = screens[tab];

  // Scale to fit viewport
  const scale = Math.min(
    (window.innerHeight - 40) / 874,
    (window.innerWidth - 40) / 402,
    1
  );

  return (
    <div style={{ transform: `scale(${scale})`, transformOrigin: 'center center' }}>
      <IOSDevice width={402} height={874} dark={themeName !== 'light'}>
        <IOSStatusBar dark={themeName !== 'light'} />
        <div style={{ position: 'relative', height: '100%', overflow: 'hidden' }}>
          <AppNavBar tab={tab} th={th}/>
          <div style={{ position: 'absolute', inset: 0, paddingBottom: 74, background: th.bg }}>
            <ActiveScreen t={t} th={th}/>
          </div>
          <TabBar active={tab} onTab={goTab} th={th}/>
        </div>
      </IOSDevice>
    </div>
  );
};
